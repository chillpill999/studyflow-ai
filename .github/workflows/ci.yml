name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black pytest pytest-cov
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

    - name: Format Check with Black
      run: black --check backend

    - name: Lint Check with Ruff
      run: ruff check backend

    - name: Run Backend Tests with Code Coverage
      run: |
        export TESTING=True
        pytest backend/tests --asyncio-mode=auto --cov=backend/app --cov-report=xml --cov-report=term-missing

    - name: Upload Backend Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: backend-coverage-report
        path: coverage.xml
        retention-days: 7

    - name: Run Pre-Deployment Verification Checks
      run: python scripts/deploy_verify.py

    - name: Run Production Stack Verification Checks
      run: python scripts/prod_verify.py

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      run: npm ci

    - name: Run TypeScript Check
      run: npx tsc --noEmit

    - name: Run Frontend Linters
      run: npm run lint

    - name: Run Vitest Component Tests
      run: npm run test

    - name: Build Frontend Application
      run: npm run build

    - name: Cache Playwright Browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps chromium

    - name: Install Playwright System Dependencies
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps chromium

    - name: Run Playwright E2E Tests
      run: npx playwright test --project=chromium

    - name: Upload Playwright Report on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30

  docker-checks:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Backend Docker Image
      run: docker build -t thestudyflow-backend backend/

    - name: Run Backend Container
      run: |
        docker run -d --name studyflow-api \
          -e TESTING=True \
          -e ENV=development \
          -e SUPABASE_URL=https://placeholder-url.supabase.co \
          -e SUPABASE_ANON_KEY=placeholder-anon-key \
          -e SUPABASE_JWT_SECRET=placeholder-jwt-secret \
          -e SUPABASE_SERVICE_ROLE_KEY=placeholder-service-role-key \
          -e GEMINI_API_KEY=placeholder-gemini-key \
          -e BACKEND_URL=http://localhost:8000 \
          -e FRONTEND_URL=http://localhost:3000 \
          -p 8000:8000 \
          thestudyflow-backend

    - name: Verify Container Start & Health Status
      run: |
        echo "Waiting for container health check status..."
        # Poll up to 10 times (30 seconds total) for the healthy state to report
        for i in {1..10}; do
          STATUS=$(docker inspect --format='{{json .State.Health.Status}}' studyflow-api || echo "unknown")
          echo "Current status: $STATUS"
          if [ "$STATUS" = "\"healthy\"" ]; then
            echo "Backend Docker container booted successfully and passed health checks!"
            exit 0
          fi
          sleep 3
        done
        echo "Docker container failed to report healthy."
        docker logs studyflow-api
        exit 1

    - name: Shutdown Container Cleanly
      if: always()
      run: |
        docker stop studyflow-api || true
        docker rm studyflow-api || true
